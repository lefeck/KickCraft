# Minimal Kickstart Configuration
# Generated by KickCraft
# Use graphical install
text

# Use CDROM installation media
cdrom

# Language and keyboard
lang en_US.UTF-8
keyboard us

# Timezone
timezone Asia/Shanghai --utc

# Hostname
network  --hostname=johnny

# Network information
network --device=eth0 --bootproto=dhcp --onboot=yes --ipv6=auto --activate

# Root password (encrypted - change this!)
rootpw --iscrypted $6$rounds=100000$jrbjRk0/4UmFEGsC$d8lU/G/Tv9TmiYtF3/qxQO65UH.OVRTUCbgKwZO7b0iUDrWW3i8VnXp/iBP/d4uCbZS5WMmB5Oy732BeqVo4M1 --allow-ssh 


# Use autopart to partition the disk
autopart --type=lvm


# Reboot the system
reboot

# SELinux
selinux --enforcing

# Firewall
firewall --disabled


# Packages
%packages
@^minimal-environment
@development
@network-server
@standard
@system-tools
%end

# kdump
%addon com_redhat_kdump --enable --reserve-mb='auto'
%end
